name = "habit-coach"
main = "dist/server/server.js"
compatibility_date = "2026-06-03"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
cwd = "."

[[build.upload.rules]]
type = "CompiledContentType"
globs = ["**/*"]
fallthrough = true

[build.upload]
format = "service-worker"
dir = "dist"
main = "dist/server/server.js"
